<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>

<div style="display:flex;flex-direction:column;gap:18px">
  <sc-if value="{{ !openDisc }}" hint-placeholder-val="{{ true }}">
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:16px">
      <sc-for list="{{ disciplinas }}" as="d" hint-placeholder-count="8">
        <div style="{{ s.card }};cursor:pointer" onClick="{{ d.onClick }}">
          <div style="display:flex;align-items:center;gap:12px">
            <div style="{{ d.iconWrap }}">{{ d.iconEl }}</div>
            <div style="flex:1">
              <div style="font-size:14.5px;font-weight:700;color:#2c2530">{{ d.nome }}</div>
              <div style="font-size:12px;color:#8b8391">{{ d.horas }} estudadas</div>
            </div>
          </div>
          <div style="margin-top:16px">
            <div style="display:flex;justify-content:space-between;font-size:12px;color:#8b8391;margin-bottom:6px"><span>Progresso</span><span style="font-weight:700;color:#2c2530">{{ d.pct }}%</span></div>
            <div style="{{ s.progressTrack }}"><div style="{{ d.bar }}"></div></div>
          </div>
        </div>
      </sc-for>
    </div>
  </sc-if>

  <sc-if value="{{ openDisc }}" hint-placeholder-val="{{ false }}">
    <div style="{{ s.card }}">
      <button style="{{ backBtn }}" onClick="{{ closeDisc }}">← Voltar às disciplinas</button>
      <div style="display:flex;align-items:center;gap:14px;margin-top:14px">
        <div style="{{ bigIconWrap }}">{{ bigIconGlyph }}</div>
        <div>
          <div style="font-size:19px;font-weight:700;color:#2c2530">{{ openDisc.nome }}</div>
          <div style="font-size:13px;color:#8b8391">{{ openDisc.horas }} estudadas · {{ openDisc.pct }}% de aproveitamento</div>
        </div>
      </div>
      <div style="{{ s.progressTrack }};margin-top:16px"><div style="{{ openDiscBar }}"></div></div>
      <div style="{{ s.sectionTitle }};margin-top:22px">Tópicos</div>
      <div style="display:flex;flex-direction:column;gap:10px;margin-top:12px">
        <sc-for list="{{ topicos }}" as="t" hint-placeholder-count="5">
          <div style="{{ topicRow }}">
            <div style="flex:1">
              <div style="font-size:13.5px;font-weight:600;color:#2c2530">{{ t.nome }}</div>
              <div style="{{ s.progressTrack }};margin-top:6px;width:220px"><div style="{{ t.bar }}"></div></div>
            </div>
            <div style="font-size:13px;font-weight:700;color:#2c2530;width:40px;text-align:right">{{ t.pct }}%</div>
            <button style="{{ s.btnOutline }}">Estudar</button>
          </div>
        </sc-for>
      </div>
    </div>
  </sc-if>
</div>

</x-dc>
<script type="text/x-dc" data-dc-script>

class Component extends DCLogic {
  state = { open: null };

  ICON_PATHS = {
    library: '<path d="m16 6 4 14" /><path d="M12 6v14" /><path d="M8 8v12" /><path d="M4 4v16" />',
  };

  svgIcon(name, color, size) {
    const px = size || 22;
    return React.createElement('svg', {
      viewBox: '0 0 24 24', width: px, height: px, fill: 'none', stroke: 'currentColor',
      strokeWidth: 2, strokeLinecap: 'round', strokeLinejoin: 'round',
      style: { color, display: 'block', flex: 'none' },
      dangerouslySetInnerHTML: { __html: this.ICON_PATHS[name] || '' },
    });
  }

  TOPICOS_POR_LETRA = (nome) => {
    const seed = nome.length;
    return ['Fundamentos', 'Princípios gerais', 'Procedimentos', 'Jurisprudência aplicada', 'Casos práticos'].map((t,i) => ({
      nome: t, pct: Math.max(20, (seed*7 + i*13) % 100)
    }));
  };

  renderVals() {
    const { theme, s, data } = this.props;
    const list = data.DISCIPLINAS || [];
    const open = this.state.open;

    return {
      s, theme,
      disciplinas: list.map(d => ({
        ...d, onClick: () => this.setState({ open: d }),
        iconWrap: { width:42, height:42, borderRadius:12, background:d.cor, display:'flex', alignItems:'center', justifyContent:'center', flex:'none' },
        iconEl: this.svgIcon('library', '#fff', 20),
        bar: { width:d.pct+'%', height:'100%', background:d.cor, borderRadius:5 },
      })),
      openDisc: open,
      closeDisc: () => this.setState({ open: null }),
      backBtn: { background:'none', border:'none', color:theme.primary, fontSize:13, fontWeight:600 },
      bigIconWrap: open ? { width:56, height:56, borderRadius:16, background:open.cor, display:'flex', alignItems:'center', justifyContent:'center', flex:'none' } : {},
      bigIconGlyph: open ? this.svgIcon('library', '#fff', 26) : null,
      openDiscBar: open ? { width:open.pct+'%', height:'100%', background:open.cor, borderRadius:5 } : {},
      topicos: open ? this.TOPICOS_POR_LETRA(open.nome).map(t => ({ ...t, bar:{ width:t.pct+'%', height:'100%', background:open.cor, borderRadius:5 } })) : [],
      topicRow: { display:'flex', alignItems:'center', gap:16, padding:'12px 14px', background:'#faf9fb', borderRadius:12 },
    };
  }
}

</script>
</body>
</html>
