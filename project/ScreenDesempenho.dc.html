<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>

<div style="display:flex;flex-direction:column;gap:18px">
  <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:14px">
    <sc-for list="{{ stats }}" as="st" hint-placeholder-count="4">
      <div style="{{ s.card }}">
        <div style="{{ s.statLabel }}">{{ st.label }}</div>
        <div style="{{ s.statNum }};margin-top:6px;color:{{ st.color }}">{{ st.value }}</div>
      </div>
    </sc-for>
  </div>

  <div style="{{ s.card }}">
    <div style="display:flex;align-items:center;justify-content:space-between">
      <div style="{{ s.sectionTitle }}">Evolução da taxa de acertos</div>
      <div style="display:flex;gap:6px">
        <sc-for list="{{ periods }}" as="p" hint-placeholder-count="3">
          <button style="{{ p.style }}" onClick="{{ p.onClick }}">{{ p.label }}</button>
        </sc-for>
      </div>
    </div>
    <div style="margin-top:16px">{{ mainChart }}</div>
  </div>

  <div style="display:grid;grid-template-columns:1fr 1fr;gap:18px">
    <div style="{{ s.card }}">
      <div style="{{ s.sectionTitle }}">Acertos x Erros por disciplina</div>
      <div style="display:flex;flex-direction:column;gap:12px;margin-top:16px">
        <sc-for list="{{ porDisciplina }}" as="d" hint-placeholder-count="6">
          <div>
            <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:5px"><span style="color:#2c2530">{{ d.nome }}</span><span style="color:#8b8391">{{ d.pct }}%</span></div>
            <div style="display:flex;height:9px;border-radius:5px;overflow:hidden;background:#f1eef4">
              <div style="{{ d.acertoBar }}"></div><div style="{{ d.erroBar }}"></div>
            </div>
          </div>
        </sc-for>
      </div>
    </div>
    <div style="{{ s.card }}">
      <div style="{{ s.sectionTitle }}">Tempo médio por questão</div>
      <div style="margin-top:16px">{{ tempoChart }}</div>
    </div>
  </div>
</div>

</x-dc>
<script type="text/x-dc" data-dc-script>

class Component extends DCLogic {
  state = { period: '7' };

  makeLine(points, color) {
    const w = 760, h = 160, max = Math.max(...points), min = Math.min(...points);
    const stepX = w / (points.length - 1);
    const norm = (v) => h - 14 - ((v - min) / (max - min || 1)) * (h - 28);
    const coords = points.map((v, i) => [i * stepX, norm(v)]);
    const path = coords.map((c, i) => (i === 0 ? 'M' : 'L') + c[0] + ',' + c[1]).join(' ');
    const area = `${path} L${coords[coords.length-1][0]},${h} L0,${h} Z`;
    return React.createElement('svg', { width:'100%', height:h, viewBox:`0 0 ${w} ${h}`, preserveAspectRatio:'none' },
      React.createElement('path', { d: area, fill: color, opacity: 0.12 }),
      React.createElement('path', { d: path, fill:'none', stroke: color, strokeWidth:3, strokeLinecap:'round', strokeLinejoin:'round' }),
      ...coords.map((c,i) => React.createElement('circle', { key:i, cx:c[0], cy:c[1], r:4, fill:'#fff', stroke:color, strokeWidth:2.5 }))
    );
  }

  makeBars(points, labels, color) {
    const w = 340, h = 140, max = Math.max(...points);
    const bw = w / points.length - 8;
    return React.createElement('svg', { width:'100%', height:h+18, viewBox:`0 0 ${w} ${h+18}` },
      ...points.map((v,i) => React.createElement('rect', { key:i, x:i*(bw+8), y:h-(v/max)*h, width:bw, height:(v/max)*h, rx:4, fill:color })),
      ...labels.map((l,i) => React.createElement('text', { key:'t'+i, x:i*(bw+8)+bw/2, y:h+14, fontSize:10, fill:'#8b8391', textAnchor:'middle' }, l))
    );
  }

  renderVals() {
    const { theme, s, data } = this.props;
    const disciplinas = data.DISCIPLINAS || [];
    const period = this.state.period;
    const series = { '7':[60,66,63,70,68,74,73], '30':[52,58,55,62,60,68,66,70,68,73,71,73], '90':[45,50,52,55,58,62,65,68,70,71,72,73] }[period];

    return {
      s, theme,
      stats: [
        { label:'Taxa de acertos geral', value:'73%', color:theme.primary },
        { label:'Questões respondidas', value:'4.312', color:'#2c2530' },
        { label:'Tempo médio', value:'1m 45s', color:'#2c2530' },
        { label:'Melhor disciplina', value:'Dir. Constitucional', color:'#10B981' },
      ],
      periods: ['7','30','90'].map(p => ({
        key:p, label: p+' dias',
        onClick: () => this.setState({ period:p }),
        style: { background: period===p ? theme.primarySoft : 'transparent', color: period===p ? theme.primaryDark : '#8b8391', border:'none', borderRadius:8, padding:'7px 12px', fontSize:12, fontWeight:600 }
      })),
      mainChart: this.makeLine(series, theme.primary),
      porDisciplina: disciplinas.map(d => ({
        nome:d.nome, pct:d.pct,
        acertoBar: { width:d.pct+'%', background:'#10B981' },
        erroBar: { width:(100-d.pct)+'%', background:'#EF4444' },
      })),
      tempoChart: this.makeBars([95,80,70,65,60,55,50], disciplinas.slice(0,7).map(d=>d.nome.split(' ')[1]||d.nome.slice(0,4)), theme.accent),
    };
  }
}

</script>
</body>
</html>
