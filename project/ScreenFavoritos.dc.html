<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>

<div style="display:flex;flex-direction:column;gap:16px">
  <div style="{{ s.card }}">
    <div style="{{ s.sectionTitle }}">{{ starIcon }}Suas questões favoritas</div>
    <div style="font-size:13px;color:#8b8391;margin-top:4px">Marque questões durante a prática para revisá-las rapidamente aqui.</div>
  </div>
  <div style="display:flex;flex-direction:column;gap:12px">
    <sc-for list="{{ favoritas }}" as="q" hint-placeholder-count="4">
      <div style="{{ s.card }};display:flex;align-items:center;gap:16px">
        {{ starItemIcon }}
        <div style="flex:1;min-width:0">
          <div style="font-size:14px;font-weight:700;color:#2c2530">{{ q.disciplina }}</div>
          <div style="font-size:13px;color:#5c5462;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">{{ q.enunciado }}</div>
        </div>
        <button style="{{ s.btnPrimary }}">▶ Revisar agora</button>
      </div>
    </sc-for>
  </div>
</div>

</x-dc>
<script type="text/x-dc" data-dc-script>

class Component extends DCLogic {
  ICON_PATHS = {
    star: '<path d="M11.525 2.295a.53.53 0 0 1 .95 0l2.31 4.679a2.123 2.123 0 0 0 1.595 1.16l5.166.756a.53.53 0 0 1 .294.904l-3.736 3.638a2.123 2.123 0 0 0-.611 1.878l.882 5.14a.53.53 0 0 1-.771.56l-4.618-2.428a2.122 2.122 0 0 0-1.973 0L6.396 21.01a.53.53 0 0 1-.77-.56l.881-5.139a2.122 2.122 0 0 0-.611-1.879L2.16 9.795a.53.53 0 0 1 .294-.906l5.165-.755a2.122 2.122 0 0 0 1.597-1.16z" />',
  };

  svgIcon(name, color, size) {
    const px = size || 22;
    return React.createElement('svg', {
      viewBox: '0 0 24 24', width: px, height: px, fill: 'none', stroke: 'currentColor',
      strokeWidth: 2, strokeLinecap: 'round', strokeLinejoin: 'round',
      style: { color, display: 'block', flex: 'none' },
      dangerouslySetInnerHTML: { __html: this.ICON_PATHS[name] || '' },
    });
  }

  renderVals() {
    const { s, theme, data } = this.props;
    const all = data.QUESTOES || [];
    return {
      s, theme, favoritas: all.slice(0,4),
      starIcon: this.svgIcon('star', theme.primary, 20),
      starItemIcon: this.svgIcon('star', '#F59E0B', 18),
    };
  }
}

</script>
</body>
</html>
