<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>

<helmet data-dc-atomics>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  body{margin:0;font-family:'Inter',sans-serif;-webkit-font-smoothing:antialiased}
  *{box-sizing:border-box}
  ::-webkit-scrollbar{width:8px;height:8px}
  ::-webkit-scrollbar-thumb{background:rgba(0,0,0,.15);border-radius:4px}
  a{color:inherit;text-decoration:none}
  a:hover{opacity:.8}
  input,select,textarea,button{font-family:inherit}
  button{cursor:pointer}
</style>
</helmet>

<div style="{{ s.app }}">

  <div style="{{ s.sidebar }}">
    <div style="{{ s.logoRow }}">
      <div style="{{ s.logoMark }}">{{ logoIcon }}</div>
      <div>
        <div style="{{ s.logoText }}">ma.</div>
        <div style="{{ s.logoSub }}">questões</div>
      </div>
    </div>

    <div style="display:flex;flex-direction:column;gap:2px;margin-top:8px">
      <sc-for list="{{ navItems }}" as="item" hint-placeholder-count="11">
        <div onClick="{{ item.onClick }}" style="{{ item.style }}">
          <div style="width:20px;display:flex;align-items:center;justify-content:center;flex:none">{{ item.iconEl }}</div>
          <span>{{ item.label }}</span>
        </div>
      </sc-for>
    </div>

    <div style="{{ s.focusCard }}">
      <div style="font-size:13px;font-weight:700;color:{{ theme.primaryDark }};display:flex;align-items:center;gap:6px">{{ targetIcon }}Foco de hoje</div>
      <div style="font-size:12.5px;color:#6b6470;margin-top:6px;line-height:1.45">{{ focusMessage }}</div>
    </div>

    <div style="{{ s.profileRow }}">
      <div style="{{ s.avatar }}">ML</div>
      <div style="flex:1;min-width:0">
        <div style="font-size:13.5px;font-weight:600;color:#2c2530">Maria Laís</div>
        <div style="font-size:11.5px;color:#8b8391">Ver perfil ›</div>
      </div>
    </div>
  </div>

  <div style="{{ s.main }}">
    <div style="{{ s.topbar }}">
      <div>
        <div style="{{ s.pageTitle }}">{{ pageTitle }}</div>
        <div style="{{ s.pageSub }}">{{ pageSub }}</div>
      </div>
      <div style="display:flex;align-items:center;gap:14px">
        <div style="{{ s.examCard }}">
          {{ gradIcon }}
          <div>
            <div style="font-size:11px;color:{{ theme.primary }};font-weight:600">Faltam</div>
            <div style="font-size:16px;font-weight:700;color:#2c2530">128 dias</div>
            <div style="font-size:10.5px;color:#8b8391">para a prova da OAB</div>
          </div>
        </div>
        <div style="{{ s.bellWrap }}" onClick="{{ toggleNotifications }}">
          {{ bellIcon }}
          <sc-if value="{{ notifCount }}" hint-placeholder-val="{{ true }}">
            <div style="{{ s.bellBadge }}">{{ notifCount }}</div>
          </sc-if>
        </div>
      </div>
    </div>

    <div style="{{ s.content }}">
      <div style="{{ screenMountStyles.dashboard }}"><dc-import name="ScreenDashboard" theme="{{ theme }}" s="{{ s }}" data="{{ data }}" go="{{ goTo }}" hint-size="100%,100%"></dc-import></div>
      <div style="{{ screenMountStyles.cronograma }}"><dc-import name="ScreenCronograma" theme="{{ theme }}" s="{{ s }}" data="{{ data }}" cronograma="{{ cronogramaState }}" hint-size="100%,100%"></dc-import></div>
      <div style="{{ screenMountStyles.questoes }}"><dc-import name="ScreenQuestoes" theme="{{ theme }}" s="{{ s }}" data="{{ data }}" quest="{{ questoesState }}" hint-size="100%,100%"></dc-import></div>
      <div style="{{ screenMountStyles.simulados }}"><dc-import name="ScreenSimulados" theme="{{ theme }}" s="{{ s }}" data="{{ data }}" sim="{{ simuladosState }}" hint-size="100%,100%"></dc-import></div>
      <div style="{{ screenMountStyles.revisoes }}"><dc-import name="ScreenRevisoes" theme="{{ theme }}" s="{{ s }}" data="{{ data }}" rev="{{ revisoesState }}" hint-size="100%,100%"></dc-import></div>
      <div style="{{ screenMountStyles.desempenho }}"><dc-import name="ScreenDesempenho" theme="{{ theme }}" s="{{ s }}" data="{{ data }}" hint-size="100%,100%"></dc-import></div>
      <div style="{{ screenMountStyles.estatisticas }}"><dc-import name="ScreenEstatisticas" theme="{{ theme }}" s="{{ s }}" data="{{ data }}" hint-size="100%,100%"></dc-import></div>
      <div style="{{ screenMountStyles.disciplinas }}"><dc-import name="ScreenDisciplinas" theme="{{ theme }}" s="{{ s }}" data="{{ data }}" disc="{{ disciplinasState }}" hint-size="100%,100%"></dc-import></div>
      <div style="{{ screenMountStyles.anotacoes }}"><dc-import name="ScreenAnotacoes" theme="{{ theme }}" s="{{ s }}" data="{{ data }}" notas="{{ anotacoesState }}" hint-size="100%,100%"></dc-import></div>
      <div style="{{ screenMountStyles.favoritos }}"><dc-import name="ScreenFavoritos" theme="{{ theme }}" s="{{ s }}" data="{{ data }}" hint-size="100%,100%"></dc-import></div>
      <div style="{{ screenMountStyles.configuracoes }}"><dc-import name="ScreenConfiguracoes" theme="{{ theme }}" s="{{ s }}" hint-size="100%,100%"></dc-import></div>
    </div>
  </div>
</div>

</x-dc>

      examCard: { display:'flex', alignItems:'center', gap:10, background:'#fff', border:`1px solid ${theme.primarySoft}`, boxShadow:'0 2px 10px rgba(0,0,0,.04)', borderRadius:14, padding:'10px 18px' },
      bellWrap: { position:'relative', width:40, height:40, borderRadius:'50%', background:'#fff', boxShadow:'0 2px 10px rgba(0,0,0,.04)', display:'flex', alignItems:'center', justifyContent:'center', flex:'none' },
      bellBadge: { position:'absolute', top:-2, right:-2, background:theme.accent, color:'#fff', fontSize:10, fontWeight:700, width:16, height:16, borderRadius:'50%', display:'flex', alignItems:'center', justifyContent:'center' },
      content: { flex:1, overflowY:'auto', padding:'0 32px 32px' },
      card: { background:'#fff', borderRadius:16, border:'1px solid rgba(0,0,0,.05)', boxShadow:'0 1px 3px rgba(0,0,0,.03)', padding:20 },
      sectionTitle: { fontSize:16, fontWeight:700, color:'#2c2530', display:'flex', alignItems:'center', gap:8 },
      link: { fontSize:12.5, color:theme.primary, fontWeight:600 },
      statNum: { fontSize:20, fontWeight:700, color:'#2c2530' },
      statLabel: { fontSize:11.5, color:'#8b8391' },
      progressTrack: { height:8, borderRadius:5, background:'#f1eef4', overflow:'hidden' },
      btnPrimary: { background:`linear-gradient(135deg, ${theme.gradA}, ${theme.gradB})`, color:'#fff', border:'none', borderRadius:10, padding:'10px 18px', fontSize:13, fontWeight:600, display:'flex', alignItems:'center', gap:6 },
      btnOutline: { background:'#fff', color:theme.primary, border:`1px solid ${theme.primarySoft}`, borderRadius:10, padding:'9px 16px', fontSize:12.5, fontWeight:600 },
      pill: (bg,fg) => ({ background:bg, color:fg, fontSize:11, fontWeight:600, padding:'3px 9px', borderRadius:20 }),
      theme,
    };
  }

  renderVals() {
    const themeKey = this.props.theme || 'rosa';
    const theme = this.THEMES[themeKey] || this.THEMES.rosa;
    const s = this.buildStyles(theme);
    const meta = this.PAGE_META[this.state.screen];

    const navItems = this.NAV.map(n => {
      const active = n.key === this.state.screen;
      return {
        key: n.key, label: n.label,
        onClick: () => this.goTo(n.key),
        iconEl: this.svgIcon(n.icon, active ? theme.primaryDark : '#9a93a1', 20),
        style: {
          display:'flex', alignItems:'center', gap:12, padding:'10px 12px', borderRadius:10,
          fontSize:13.5, fontWeight: active ? 600 : 500,
          color: active ? theme.primaryDark : '#5c5462',
          background: active ? theme.primarySoft : 'transparent',
        }
      };
    });

    const screenMountStyles = {};
    ['dashboard','cronograma','questoes','simulados','revisoes','desempenho','estatisticas','disciplinas','anotacoes','favoritos','configuracoes'].forEach(k => {
      screenMountStyles[k] = { display: this.state.screen === k ? 'block' : 'none' };
    });

    const data = {
      DISCIPLINAS: this.DISCIPLINAS,
      QUESTOES: this.state.questoes.list || this.QUESTOES,
      SIMULADOS: this.SIMULADOS,
      CRONOGRAMA_DIAS: this.CRONOGRAMA_DIAS,
      ANOTACOES: this.ANOTACOES,
      ANOTACOES_FOLDERS: this.ANOTACOES_FOLDERS,
    };

    return {
      s, theme, data, navItems, screenMountStyles,
      pageTitle: meta.title, pageSub: meta.sub,
      notifCount: this.state.notifOpen ? 0 : 3,
      toggleNotifications: this.toggleNotifications,
      focusMessage: 'Manter a consistência é o segredo do sucesso! 💜',
      goTo: this.goTo,
      logoIcon: this.svgIcon('scale', '#ffffff', 17),
      targetIcon: this.svgIcon('target', theme.primaryDark, 15),
      gradIcon: this.svgIcon('graduation-cap', theme.primary, 20),
      bellIcon: this.svgIcon('bell', '#5c5462', 19),
      cronogramaState: this.state.cronograma,
      questoesState: this.state.questoes,
      simuladosState: this.state.simulados,
      revisoesState: this.state.revisoes,
      disciplinasState: this.state.disciplinas,
      anotacoesState: this.state.anotacoes,
    };
  }
}

</script>
</body>
</html>
