<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>

<div style="display:flex;flex-direction:column;gap:16px">
  <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:14px">
    <sc-for list="{{ stats }}" as="st" hint-placeholder-count="4">
      <div style="{{ s.card }}">
        <div style="font-size:11.5px;color:#8b8391">{{ st.label }}</div>
        <div style="{{ s.statNum }};margin-top:4px">{{ st.value }}</div>
      </div>
    </sc-for>
  </div>

  <div style="display:flex;flex-direction:column;gap:12px">
    <sc-for list="{{ simulados }}" as="sim" hint-placeholder-count="4">
      <div style="{{ s.card }};display:flex;align-items:center;gap:18px;flex-wrap:wrap">
        <div style="{{ iconWrap }}">{{ timerIcon }}</div>
        <div style="flex:1;min-width:220px">
          <div style="font-size:14.5px;font-weight:700;color:#2c2530">{{ sim.nome }}</div>
          <div style="display:flex;gap:8px;margin-top:6px">
            <span style="{{ s.pill('#f3f1f5','#8b8391') }}">{{ sim.questoes }} questões</span>
            <span style="{{ s.pill('#f3f1f5','#8b8391') }}">{{ sim.tempo }}</span>
          </div>
        </div>
        <sc-if value="{{ sim.showProgress }}">
          <div style="width:160px">
            <div style="display:flex;justify-content:space-between;font-size:11.5px;color:#8b8391;margin-bottom:5px"><span>Progresso</span><span style="font-weight:700;color:#2c2530">{{ sim.progresso }}%</span></div>
            <div style="{{ s.progressTrack }}"><div style="{{ sim.barStyle }}"></div></div>
          </div>
        </sc-if>
        <sc-if value="{{ sim.showNota }}">
          <div style="{{ sim.notaWrap }}">{{ sim.ultimaNota }}%<div style="font-size:9.5px;font-weight:500">nota</div></div>
        </sc-if>
        <span style="{{ sim.statusPill }}">{{ sim.statusLabel }}</span>
        <button style="{{ sim.btnStyle }}" onClick="{{ sim.onClick }}">{{ sim.btnLabel }}</button>
      </div>
    </sc-for>
  </div>
</div>

</x-dc>
<script type="text/x-dc" data-dc-script>

class Component extends DCLogic {
  state = { running: {} };

  ICON_PATHS = {
    timer: '<line x1="10" x2="14" y1="2" y2="2" /><line x1="12" x2="15" y1="14" y2="11" /><circle cx="12" cy="14" r="8" />',
  };

  svgIcon(name, color, size) {
    const px = size || 22;
    return React.createElement('svg', {
      viewBox: '0 0 24 24', width: px, height: px, fill: 'none', stroke: 'currentColor',
      strokeWidth: 2, strokeLinecap: 'round', strokeLinejoin: 'round',
      style: { color, display: 'block', flex: 'none' },
      dangerouslySetInnerHTML: { __html: this.ICON_PATHS[name] || '' },
    });
  }

  toggle = (id) => this.setState(s => ({ running: { ...s.running, [id]: !s.running[id] } }));

  renderVals() {
    const { theme, s, data } = this.props;
    const list = data.SIMULADOS || [];
    const statusMeta = {
      disponivel: { label:'Disponível', bg:'#E0F2FE', fg:'#0369A1' },
      em_andamento: { label:'Em andamento', bg:'#FEF3C7', fg:'#B45309' },
      concluido: { label:'Concluído', bg:'#D1FAE5', fg:'#047857' },
    };

    const simulados = list.map(sim => {
      const running = this.state.running[sim.id];
      const status = running ? 'em_andamento' : sim.status;
      const meta = statusMeta[status];
      return {
        ...sim,
        showProgress: status === 'em_andamento',
        showNota: status === 'concluido' && sim.ultimaNota != null,
        progresso: sim.progresso || (running ? 20 : 0),
        barStyle: { width:(sim.progresso||20)+'%', height:'100%', background:`linear-gradient(90deg, ${theme.gradA}, ${theme.gradB})`, borderRadius:5 },
        notaWrap: { width:52, height:52, borderRadius:'50%', background:theme.primarySoft, color:theme.primaryDark, display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', fontSize:14, fontWeight:700, flex:'none' },
        statusPill: s.pill(meta.bg, meta.fg),
        statusLabel: meta.label,
        btnStyle: status === 'concluido' ? s.btnOutline : { ...s.btnPrimary, flex:'none' },
        btnLabel: status === 'concluido' ? 'Ver resultado' : (status === 'em_andamento' ? '▶ Continuar' : '▶ Iniciar simulado'),
        onClick: () => status !== 'concluido' && this.toggle(sim.id),
      };
    });

    return {
      s, theme, simulados,
      iconWrap: { width:46, height:46, borderRadius:13, background:`linear-gradient(135deg, ${theme.gradA}, ${theme.gradB})`, display:'flex', alignItems:'center', justifyContent:'center', flex:'none' },
      timerIcon: this.svgIcon('timer', '#fff', 22),
      stats: [
        { label:'Simulados disponíveis', value: list.filter(x=>x.status==='disponivel').length },
        { label:'Em andamento', value: list.filter(x=>x.status==='em_andamento').length },
        { label:'Concluídos', value: list.filter(x=>x.status==='concluido').length },
        { label:'Média de acertos', value:'78%' },
      ],
    };
  }
}

</script>
</body>
</html>
